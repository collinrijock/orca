          node --check config/scripts/ssh-relay-runtime-manifest-tuple.test.mjs
          node --check config/scripts/ssh-relay-runtime-post-sign-metadata.mjs
          node --check config/scripts/ssh-relay-runtime-post-sign-metadata.test.mjs
          node --check config/scripts/ssh-relay-runtime-archive-extraction.mjs
