name: SSH Relay Runtime Artifacts

on:
  pull_request:
    paths:
      - '.github/workflows/ssh-relay-runtime-artifacts.yml'
      - 'config/patches/node-pty@1.1.0.patch'
      - 'config/ssh-relay-runtime-linux-builder.Containerfile'
      - 'config/scripts/build-relay.mjs'
      - 'config/scripts/*ssh-relay*'
      - 'config/ssh-relay-node-release-keys/**'
      - 'config/ssh-relay-node-release-v24.18.0.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/main/ipc/parcel-watcher-process-entry.ts'
      - 'src/main/ssh/ssh-relay-runtime-*'
      - 'src/relay/**'
  workflow_dispatch:
  # Why: callers may gate on the native graph only after separate release wiring is reviewed.
  workflow_call:
    inputs:
      include-baseline-gates:
        description: Run separately gated oldest-baseline qualification jobs
        required: false
        default: true
        type: boolean

concurrency:
  group: ssh-relay-runtime-artifacts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-posix-runtime:
    name: Build ${{ matrix.tuple }} runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            tuple: linux-x64-glibc
            node_archive: node-v24.18.0-linux-x64.tar.xz
            container_image: docker.io/library/rockylinux@sha256:2d05a9266523bbf24f33ebc3a9832e4d5fd74b973c220f2204ca802286aa275d
          - runner: ubuntu-24.04-arm
            tuple: linux-arm64-glibc
            node_archive: node-v24.18.0-linux-arm64.tar.xz
            container_image: docker.io/library/rockylinux@sha256:3c2d0ce12bf79fc5ff05e43b1000e30ff062dc89405525f3307cbff71661f1a0
          - runner: macos-15-intel
            tuple: darwin-x64
            node_archive: node-v24.18.0-darwin-x64.tar.xz
          - runner: macos-15
            tuple: darwin-arm64
            node_archive: node-v24.18.0-darwin-arm64.tar.xz
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      ORCA_RUNTIME_REQUESTED_RUNNER: ${{ matrix.runner }}

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Why: artifact evidence must name the exact reviewed source, not GitHub's synthetic merge.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false

      - name: Setup Node 24.18.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Record native runner identity
        shell: bash
        run: |
          set -euo pipefail
          printf 'requested_runner=%s\n' '${{ matrix.runner }}'
          printf 'resolved_image_os=%s\n' "${ImageOS:-unknown}"
          printf 'resolved_image_version=%s\n' "${ImageVersion:-unknown}"
          printf 'runner_arch=%s\n' "$RUNNER_ARCH"
          printf 'runner_environment=%s\n' "$RUNNER_ENVIRONMENT"
          uname -a
          node --version
          printf 'source_commit=%s\n' "$(git rev-parse HEAD)"

      - name: Install Linux build and verification tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # Why: hosted ARM mirror egress can disappear; prove preinstalled tools before bounded APT fallback.
          probe_root=$(mktemp -d)
          trap 'rm -rf "$probe_root"' EXIT
          required_commands=(cc c++ make ar ld strip curl gpg gpgv python3 xz)
          missing_requirements=()
          for required_command in "${required_commands[@]}"; do
            if ! command -v "$required_command" >/dev/null; then
              missing_requirements+=("$required_command")
            fi
          done
          if [ ! -r /etc/ssl/certs/ca-certificates.crt ]; then
            missing_requirements+=(ca-certificates)
          fi

          probe_c_toolchain() {
            printf '%s\n' '#include <stdlib.h>' 'int main(void) { return EXIT_SUCCESS; }' \
              | cc -x c - -o "$probe_root/orca-ci-c-probe" \
              && "$probe_root/orca-ci-c-probe"
          }
          probe_cxx_toolchain() {
            printf '%s\n' '#include <cstdlib>' 'int main() { return EXIT_SUCCESS; }' \
              | c++ -x c++ - -o "$probe_root/orca-ci-cxx-probe" \
              && "$probe_root/orca-ci-cxx-probe"
          }
          if command -v cc >/dev/null && command -v c++ >/dev/null; then
            if ! probe_c_toolchain || ! probe_cxx_toolchain; then
              missing_requirements+=(build-essential)
            fi
          fi

          if ((${#missing_requirements[@]} > 0)); then
            printf 'missing Linux prerequisites: %s\n' "${missing_requirements[*]}"
            for source_file in /etc/apt/sources.list /etc/apt/sources.list.d/*.sources; do
              [ -f "$source_file" ] || continue
              sudo sed -i \
                -e 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' \
                -e 's|http://archive.ubuntu.com|https://archive.ubuntu.com|g' \
                -e 's|http://security.ubuntu.com|https://security.ubuntu.com|g' \
                -e 's|http://azure.archive.ubuntu.com|https://azure.archive.ubuntu.com|g' \
                "$source_file"
            done
            apt_options=(
              -o Acquire::Retries=3
              -o Acquire::http::Timeout=15
              -o Acquire::https::Timeout=15
              -o Acquire::ForceIPv4=true
              -o DPkg::Lock::Timeout=60
            )
            timeout --signal=TERM --kill-after=15s 180s sudo apt-get "${apt_options[@]}" update -qq
            timeout --signal=TERM --kill-after=15s 180s sudo apt-get "${apt_options[@]}" install -y -qq \
              build-essential ca-certificates curl gnupg gpgv python3 xz-utils
          fi

          for required_command in "${required_commands[@]}"; do
            command -v "$required_command" >/dev/null
          done
          test -r /etc/ssl/certs/ca-certificates.crt
          probe_c_toolchain
          probe_cxx_toolchain

      - name: Install macOS signature verifier
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew list gnupg >/dev/null 2>&1 || brew install gnupg
          command -v xz
          xcodebuild -version

      - name: Install source dependencies without native postinstall
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Run runtime artifact contract tests
        shell: bash
        run: |
          set -euo pipefail
          node --check config/scripts/ssh-relay-runtime-compatibility.mjs
          node --check config/scripts/ssh-relay-runtime-compatibility.test.mjs
          node --check config/scripts/ssh-relay-runtime-reproducibility.mjs
          node --check config/scripts/ssh-relay-runtime-reproducibility.test.mjs
          node --check config/scripts/ssh-relay-runtime-baseline.mjs
          node --check config/scripts/ssh-relay-runtime-baseline.test.mjs
          node --check config/scripts/ssh-relay-runtime-linux-build-evidence.mjs
          node --check config/scripts/ssh-relay-runtime-linux-build-evidence.test.mjs
          node --check config/scripts/ssh-relay-linux-node-gyp-compiler.mjs
          node --check config/scripts/ssh-relay-linux-node-gyp-compiler.test.mjs
          node --check config/scripts/build-ssh-relay-runtime.mjs
          node --check config/scripts/ssh-relay-runtime-build.test.mjs
          node --check config/scripts/ssh-relay-runtime-closure.mjs
          node --check config/scripts/ssh-relay-runtime-closure.test.mjs
          node --check config/scripts/ssh-relay-runtime-sbom.mjs
          node --check config/scripts/ssh-relay-runtime-sbom.test.mjs
          node --check config/scripts/ssh-relay-runtime-provenance.test.mjs
          node --check config/scripts/ssh-relay-runtime-toolchain.mjs
          node --check config/scripts/ssh-relay-runtime-toolchain.test.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-plan.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-plan.test.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-selection.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-selection.test.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-payload.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-payload.test.mjs
          node --check config/scripts/ssh-relay-runtime-windows-authenticode-assessment.mjs
          node --check config/scripts/ssh-relay-runtime-windows-authenticode-assessment.test.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-stage.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-stage.test.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-apply.mjs
          node --check config/scripts/ssh-relay-runtime-native-signing-apply.test.mjs
          node --check config/scripts/ssh-relay-runtime-macos-signature-verification.mjs
          node --check config/scripts/ssh-relay-runtime-macos-signature-verification.test.mjs
          node --check config/scripts/ssh-relay-runtime-windows-signature-verification.mjs
