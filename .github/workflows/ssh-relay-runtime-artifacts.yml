      - name: Download exact Node release inputs
        shell: bash
        run: |
          set -euo pipefail
          inputs="$RUNNER_TEMP/node-release-inputs"
          mkdir -p "$inputs"
          base='https://nodejs.org/dist/v24.18.0'
          for asset in SHASUMS256.txt SHASUMS256.txt.sig '${{ matrix.node_archive }}'; do
            curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
              --connect-timeout 20 --max-time 300 --retry 2 --retry-delay 2 --retry-all-errors \
              "$base/$asset" --output "$inputs/$asset"
          done
          printf 'NODE_INPUTS=%s\n' "$inputs" >> "$GITHUB_ENV"

      - name: Prepare digest-pinned Linux floor builder
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          image='${{ matrix.container_image }}'
          builder="orca-ssh-relay-linux-builder:${GITHUB_RUN_ID}-${{ matrix.tuple }}"
          docker pull "$image"
          docker build --pull=false \
            --build-arg "BASE_IMAGE=$image" \
            --file config/ssh-relay-runtime-linux-builder.Containerfile \
            --tag "$builder" .
          docker image inspect "$image" --format 'linux_floor_base={{index .RepoDigests 0}}'
          docker image inspect "$builder" --format 'linux_floor_builder_id={{.Id}}'
          printf 'ORCA_LINUX_BUILDER=%s\n' "$builder" >> "$GITHUB_ENV"

      - name: Build twice, inspect, smoke, and compare exact runtime
        shell: bash
        run: |
          set -euo pipefail
          output_root="$RUNNER_TEMP/ssh-relay-runtime/${{ matrix.tuple }}"
          work_directory="$RUNNER_TEMP/orca-ssh-relay-runtime-build-work"
          source_commit=$(git rev-parse HEAD)
          source_date_epoch=$(git show -s --format=%ct "$source_commit")
          if [[ '${{ matrix.tuple }}' == linux-* ]]; then
            # Why: package installation is isolated earlier; native compilation itself has no egress.
            docker run --rm --network none --read-only --cap-drop all \
              --user "$(id -u):$(id -g)" \
              --security-opt no-new-privileges --pids-limit 512 --memory 6g --cpus 4 \
              --tmpfs /tmp:rw,nosuid,size=1g,mode=1777 \
              --mount "type=bind,src=$GITHUB_WORKSPACE,dst=$GITHUB_WORKSPACE" \
              --mount "type=bind,src=$RUNNER_TEMP,dst=$RUNNER_TEMP" \
              --workdir "$GITHUB_WORKSPACE" \
              --env "GITHUB_ACTIONS=$GITHUB_ACTIONS" \
              --env "GITHUB_REPOSITORY=$GITHUB_REPOSITORY" \
              --env "GITHUB_RUN_ID=$GITHUB_RUN_ID" \
              --env "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF" \
              --env "RUNNER_OS=$RUNNER_OS" \
              --env "RUNNER_ARCH=$RUNNER_ARCH" \
              --env "RUNNER_ENVIRONMENT=$RUNNER_ENVIRONMENT" \
              --env "ORCA_RUNTIME_REQUESTED_RUNNER=$ORCA_RUNTIME_REQUESTED_RUNNER" \
              --env 'ImageOS=rockylinux-8' \
              --env 'ImageVersion=${{ matrix.container_image }}' \
              --env 'HOME=/tmp' \
              "$ORCA_LINUX_BUILDER" \
              /usr/bin/node config/scripts/ssh-relay-runtime-linux-build-evidence.mjs \
                --tuple '${{ matrix.tuple }}' \
                --inputs-directory "$NODE_INPUTS" \
                --output-root "$output_root" \
                --work-directory "$work_directory" \
                --evidence-directory "$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}" \
                --source-date-epoch "$source_date_epoch" \
                --git-commit "$source_commit"
            first_output="$output_root/first"
            identity="$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json"
            archive=$(find "$first_output" -maxdepth 1 -name '*.tar.br' -print -quit)
            test -n "$archive"
            executed_runtime="$output_root/readback-executed"
            # Why: exercise only local verified bytes; release writes and remote consumers stay disconnected.
            docker run --rm --network none --read-only --cap-drop all \
              --user "$(id -u):$(id -g)" \
              --security-opt no-new-privileges --pids-limit 512 --memory 6g --cpus 4 \
              --tmpfs /tmp:rw,nosuid,size=1g,mode=1777 \
              --mount "type=bind,src=$GITHUB_WORKSPACE,dst=$GITHUB_WORKSPACE" \
              --mount "type=bind,src=$RUNNER_TEMP,dst=$RUNNER_TEMP" \
              --workdir "$GITHUB_WORKSPACE" \
              "$ORCA_LINUX_BUILDER" \
              /usr/bin/node config/scripts/ssh-relay-runtime-readback-archive-execution.mjs \
                --identity "$identity" \
                --archive "$archive" \
                --output-directory "$executed_runtime"
            rm -rf -- "$executed_runtime"
            test ! -e "$executed_runtime"
            signing_stage="$output_root/signing-stage"
            signing_report="$output_root/orca-ssh-relay-runtime-${{ matrix.tuple }}.signing-stage.json"
            node config/scripts/ssh-relay-runtime-native-signing-stage.mjs \
              --identity "$identity" \
              --runtime-directory "$first_output/runtime" \
              --staging-directory "$signing_stage" > "$signing_report"
            node -e '
              const { readFileSync } = require("node:fs")
              const report = JSON.parse(readFileSync(process.argv[1], "utf8"))
              if (report.platform !== "linux" || report.assessments.length !== 0 ||
                  report.signingFiles.length !== 0 || report.preservedUpstreamFiles.length !== 0 ||
                  report.payload.stagingRequired !== false || report.payload.stagedFiles.length !== 0) {
                throw new Error("Linux signing-stage report violates the hash-only contract")
              }
            ' "$signing_report"
            test ! -e "$signing_stage"
            cp "$signing_report" "$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}/"
            verified_at=$(node -e 'process.stdout.write(new Date().toISOString())')
            final_output="$output_root/linux-final"
            node config/scripts/ssh-relay-runtime-linux-finalization.mjs \
              --source-output-directory "$first_output" \
              --identity "$identity" \
              --output-directory "$final_output" \
              --verified-at "$verified_at" \
              --native-verification-tool-version "$(node -p 'process.versions.node')"
            cp "$final_output/assets/orca-ssh-relay-runtime-${{ matrix.tuple }}.manifest-tuple.json" \
              "$final_output/evidence/${{ matrix.tuple }}.linux-finalization.json" \
              "$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}/"
            exit 0
          fi
          mkdir -p "$output_root"
          first_output="$output_root/first"
          second_output="$output_root/second"
          for output in "$first_output" "$second_output"; do
            printf 'clean_build_output=%s\n' "$output"
            /usr/bin/time -p node config/scripts/build-ssh-relay-runtime.mjs \
              --tuple '${{ matrix.tuple }}' \
              --inputs-directory "$NODE_INPUTS" \
              --output-directory "$output" \
              --work-directory "$work_directory" \
              --source-date-epoch "$source_date_epoch" \
              --git-commit "$source_commit"
            identity="$output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json"
            archive=$(find "$output" -maxdepth 1 -name '*.tar.br' -print -quit)
            test -n "$archive"
            /usr/bin/time -p node config/scripts/verify-ssh-relay-runtime.mjs \
              --runtime-directory "$output/runtime" \
              --identity "$identity" \
              --archive "$archive"
            if find "$output/runtime" -type f \( -name npm -o -name npx -o -name corepack -o -name '*.map' \) -print -quit | grep -q .; then
              echo 'Runtime contains a prohibited package manager or source map.' >&2
              exit 1
            fi
            parcel_packages=$(find "$output/runtime/node_modules/@parcel" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
            test "$parcel_packages" = 2
          done
          node config/scripts/ssh-relay-runtime-reproducibility.mjs \
            --tuple '${{ matrix.tuple }}' \
            --first-output-directory "$first_output" \
            --second-output-directory "$second_output"
          identity="$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json"
          archive=$(find "$first_output" -maxdepth 1 -name '*.tar.br' -print -quit)
          test -n "$archive"
          executed_runtime="$output_root/readback-executed"
          # Why: exercise only local verified bytes; release writes and remote consumers stay disconnected.
          node config/scripts/ssh-relay-runtime-readback-archive-execution.mjs \
            --identity "$identity" \
            --archive "$archive" \
            --output-directory "$executed_runtime"
          rm -rf -- "$executed_runtime"
          test ! -e "$executed_runtime"
          signing_stage="$output_root/signing-stage"
          signing_report="$output_root/orca-ssh-relay-runtime-${{ matrix.tuple }}.signing-stage.json"
          node config/scripts/ssh-relay-runtime-native-signing-stage.mjs \
            --identity "$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json" \
            --runtime-directory "$first_output/runtime" \
            --staging-directory "$signing_stage" > "$signing_report"
          node -e '
            const { readFileSync } = require("node:fs")
            const report = JSON.parse(readFileSync(process.argv[1], "utf8"))
            if (report.platform !== "darwin" || report.assessments.length !== 0 ||
                report.signingFiles.length !== 3 || report.preservedUpstreamFiles.length !== 0 ||
                report.payload.stagingRequired !== true || report.payload.stagedFiles.length !== 3) {
              throw new Error("macOS signing-stage report violates the Developer ID contract")
            }
          ' "$signing_report"
          test "$(find "$signing_stage" -type f | wc -l | tr -d ' ')" = 3
          test ! -e "$signing_stage/bin/node"
          rm -rf -- "$signing_stage"
          mkdir -p "$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}"
          cp "$first_output"/*.tar.br "$first_output"/*.spdx.json "$first_output"/*.provenance.json "$first_output"/*.identity.json \
            "$signing_report" "$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}/"

      - name: Measure full-size desktop extraction and cache boundaries
        shell: bash
        run: |
          set -euo pipefail
          first_output="$RUNNER_TEMP/ssh-relay-runtime/${{ matrix.tuple }}/first"
          identity="$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json"
          archive=$(find "$first_output" -maxdepth 1 -name '*.tar.br' -print -quit)
          test -n "$archive"
          extraction_output="$RUNNER_TEMP/ssh-relay-runtime/${{ matrix.tuple }}/desktop-extraction-measurement"
          # Why: exact payload size can expose memory behavior that synthetic archive fixtures cannot.
          ORCA_SSH_RELAY_FULL_SIZE_ARCHIVE="$archive" \
            ORCA_SSH_RELAY_FULL_SIZE_IDENTITY="$identity" \
            ORCA_SSH_RELAY_FULL_SIZE_OUTPUT="$extraction_output" \
            pnpm exec vitest run --config config/vitest.config.ts --maxWorkers=1 --reporter=verbose \
              src/main/ssh/ssh-relay-artifact-extraction-full-size.test.ts
          test ! -e "$extraction_output"
          ORCA_SSH_RELAY_FULL_SIZE_ARCHIVE="$archive" \
            ORCA_SSH_RELAY_FULL_SIZE_IDENTITY="$identity" \
            ORCA_SSH_RELAY_FULL_SIZE_OUTPUT="$extraction_output" \
            pnpm exec vitest run --config config/vitest.config.ts --maxWorkers=1 --reporter=verbose \
              src/main/ssh/ssh-relay-artifact-cache-entry-full-size.test.ts
          test ! -e "$extraction_output"

      - name: Start loopback OpenSSH SFTP fixture
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if ! test -x /usr/sbin/sshd; then
            apt_options=(-o Acquire::Retries=3 -o Acquire::https::Timeout=15 -o Acquire::ForceIPv4=true)
            timeout --signal=TERM --kill-after=15s 180s sudo apt-get "${apt_options[@]}" update -qq
            timeout --signal=TERM --kill-after=15s 180s sudo apt-get "${apt_options[@]}" install -y -qq openssh-server
          fi
          fixture="$RUNNER_TEMP/orca-live-sftp"
          mkdir -p "$fixture" "$HOME/.ssh" "$fixture/remote"
          chmod 700 "$HOME/.ssh" "$fixture"
          ssh-keygen -q -t ed25519 -N '' -f "$fixture/client-key"
          ssh-keygen -q -t ed25519 -N '' -f "$fixture/host-key"
          cp "$fixture/client-key.pub" "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys" "$fixture/client-key" "$fixture/host-key"
          sudo chown root:root "$fixture/host-key"
          # Why: hosted runner accounts are shadow-locked, which sshd rejects before public-key auth.
          random_password=$(openssl rand -hex 32)
          sudo usermod --password "$(openssl passwd -6 "$random_password")" "$USER"
          unset random_password
          port=22222
          server_version=$(/usr/sbin/sshd -V 2>&1 | head -1)
          config="$fixture/sshd_config"
          printf '%s\n' \
            "Port $port" \
            'ListenAddress 127.0.0.1' \
            "HostKey $fixture/host-key" \
            "PidFile $fixture/sshd.pid" \
            "AuthorizedKeysFile $HOME/.ssh/authorized_keys" \
            "AllowUsers $USER" \
            'PasswordAuthentication no' \
            'KbdInteractiveAuthentication no' \
            'ChallengeResponseAuthentication no' \
            'UsePAM no' \
            'StrictModes yes' \
            'LogLevel VERBOSE' \
            'Subsystem sftp internal-sftp' > "$config"
          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd -f "$config" -E "$fixture/sshd.log"
          for attempt in {1..20}; do
            if ssh -F /dev/null -i "$fixture/client-key" -p "$port" \
              -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "$USER@127.0.0.1" true; then
              break
            fi
            if test "$attempt" = 20; then
              sudo tail -200 "$fixture/sshd.log"
              exit 1
            fi
            sleep 0.25
          done
          {
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_HOST=127.0.0.1\n'
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_PORT=%s\n' "$port"
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_USER=%s\n' "$USER"
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_IDENTITY=%s\n' "$fixture/client-key"
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_REMOTE_ROOT=%s\n' "$fixture/remote"
            printf 'ORCA_SSH_RELAY_LIVE_SFTP_SERVER_VERSION=%s\n' "$server_version"
          } >> "$GITHUB_ENV"

      - name: Measure exact full-size runtime over live OpenSSH SFTP
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          first_output="$RUNNER_TEMP/ssh-relay-runtime/${{ matrix.tuple }}/first"
          ORCA_SSH_RELAY_FULL_SIZE_RUNTIME_ROOT="$first_output/runtime" \
            ORCA_SSH_RELAY_FULL_SIZE_IDENTITY="$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json" \
            pnpm exec vitest run --config config/vitest.config.ts --maxWorkers=1 --reporter=verbose \
              src/main/ssh/ssh-relay-runtime-sftp-openssh-full-size.test.ts

      - name: Start restricted loopback OpenSSH POSIX system-SSH fixture
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/orca-live-sftp"
          test -x /usr/sbin/sshd
          test -s "$fixture/client-key"
          test -s "$fixture/host-key"
          system_fixture="$fixture/system-ssh"
          primitives="$system_fixture/primitives"
          mkdir -p "$primitives"
          ln -s "$(command -v mkdir)" "$primitives/mkdir"
          ln -s "$(command -v chmod)" "$primitives/chmod"
          ln -s "$(command -v cat)" "$primitives/cat"
          ln -s "$(command -v rm)" "$primitives/rm"
          wrapper="$system_fixture/restricted-command"
          printf '%s\n' \
            '#!/bin/sh' \
            'PATH="${0%/*}/primitives"' \
            'export PATH' \
            'exec /bin/sh -c "$SSH_ORIGINAL_COMMAND"' > "$wrapper"
          chmod 755 "$wrapper"
          port=22223
          known_hosts="$HOME/.ssh/known_hosts"
          printf '[127.0.0.1]:%s %s\n' "$port" "$(cat "$fixture/host-key.pub")" >> "$known_hosts"
          chmod 600 "$known_hosts"
          config="$system_fixture/sshd_config"
          printf '%s\n' \
            "Port $port" \
            'ListenAddress 127.0.0.1' \
            "HostKey $fixture/host-key" \
            "PidFile $system_fixture/sshd.pid" \
            "AuthorizedKeysFile $HOME/.ssh/authorized_keys" \
            "AllowUsers $USER" \
            'PasswordAuthentication no' \
            'KbdInteractiveAuthentication no' \
            'ChallengeResponseAuthentication no' \
            'UsePAM no' \
            'StrictModes yes' \
            'LogLevel VERBOSE' \
            "ForceCommand $wrapper" > "$config"
          sudo /usr/sbin/sshd -f "$config" -E "$system_fixture/sshd.log"
          for attempt in {1..20}; do
            if ssh -F /dev/null -i "$fixture/client-key" -p "$port" \
              -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$known_hosts" "$USER@127.0.0.1" true; then
              break
            fi
            if test "$attempt" = 20; then
              sudo tail -200 "$system_fixture/sshd.log"
              exit 1
            fi
            sleep 0.25
          done
          server_version=$(/usr/sbin/sshd -V 2>&1 | head -1)
          {
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_HOST=127.0.0.1\n'
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_PORT=%s\n' "$port"
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_USER=%s\n' "$USER"
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_IDENTITY=%s\n' "$fixture/client-key"
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_REMOTE_ROOT=%s\n' "$fixture/remote"
            printf 'ORCA_SSH_RELAY_LIVE_SYSTEM_SSH_SERVER_VERSION=%s\n' "$server_version"
          } >> "$GITHUB_ENV"

      - name: Measure exact full-size runtime over POSIX system SSH
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          first_output="$RUNNER_TEMP/ssh-relay-runtime/${{ matrix.tuple }}/first"
          ORCA_SSH_FORCE_SYSTEM_TRANSPORT=1 \
            ORCA_SSH_RELAY_FULL_SIZE_RUNTIME_ROOT="$first_output/runtime" \
            ORCA_SSH_RELAY_FULL_SIZE_IDENTITY="$first_output/orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json" \
            pnpm exec vitest run --config config/vitest.config.ts --maxWorkers=1 --reporter=verbose \
              src/main/ssh/ssh-relay-runtime-posix-system-ssh-openssh-full-size.test.ts

      - name: Stop restricted loopback OpenSSH POSIX system-SSH fixture
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          system_fixture="$RUNNER_TEMP/orca-live-sftp/system-ssh"
          if test -s "$system_fixture/sshd.pid"; then
            sudo kill "$(cat "$system_fixture/sshd.pid")" || true
          fi
          if test -f "$system_fixture/sshd.log"; then
            sudo tail -200 "$system_fixture/sshd.log"
          fi

      - name: Stop loopback OpenSSH SFTP fixture
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/orca-live-sftp"
          if test -s "$fixture/sshd.pid"; then
            sudo kill "$(cat "$fixture/sshd.pid")" || true
          fi
          if test -f "$fixture/sshd.log"; then
            sudo tail -200 "$fixture/sshd.log"
          fi

      - name: Upload unpublished artifact evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ssh-relay-runtime-${{ matrix.tuple }}
          path: runtime-evidence/${{ matrix.tuple }}/
          if-no-files-found: error
          retention-days: 7

  build-windows-runtime:
    name: Build ${{ matrix.tuple }} runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            tuple: win32-x64
            node_archive: node-v24.18.0-win-x64.zip
            node_library: win-x64/node.lib
            msvc_arch: x64
          - runner: windows-11-arm
            tuple: win32-arm64
            node_archive: node-v24.18.0-win-arm64.zip
            node_library: win-arm64/node.lib
            msvc_arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      ORCA_RUNTIME_REQUESTED_RUNNER: ${{ matrix.runner }}

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Why: artifact evidence must name the exact reviewed source, not GitHub's synthetic merge.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Configure target-native MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false

      - name: Setup Node 24.18.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Record native runner identity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "requested_runner=${{ matrix.runner }}"
          "resolved_image_os=$env:ImageOS"
          "resolved_image_version=$env:ImageVersion"
          "runner_arch=$env:RUNNER_ARCH"
          "runner_environment=$env:RUNNER_ENVIRONMENT"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber
          node --version
          "source_commit=$(git rev-parse HEAD)"

      - name: Select bundled Git signature tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $gitUsrBin = Join-Path $env:ProgramFiles 'Git/usr/bin'
          foreach ($tool in @('gpg.exe', 'gpgv.exe')) {
            if (-not (Test-Path -LiteralPath (Join-Path $gitUsrBin $tool) -PathType Leaf)) {
              throw "Git for Windows does not provide required signature tool: $tool"
            }
          }
          $gitUsrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install source dependencies without native postinstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm install --frozen-lockfile --ignore-scripts
          if ($LASTEXITCODE -ne 0) { throw 'pnpm install failed' }
          git diff --exit-code package.json pnpm-lock.yaml
          if ($LASTEXITCODE -ne 0) { throw 'frozen install changed dependency files' }

      - name: Run runtime artifact contract tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          node --check config/scripts/ssh-relay-runtime-compatibility.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime compatibility syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-compatibility.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime compatibility test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-reproducibility.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime reproducibility script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-reproducibility.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime reproducibility test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-baseline.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime baseline script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-baseline.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime baseline test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-linux-build-evidence.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Linux runtime evidence script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-linux-build-evidence.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Linux runtime evidence test syntax check failed' }
          node --check config/scripts/ssh-relay-linux-node-gyp-compiler.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Linux node-gyp compiler script syntax check failed' }
          node --check config/scripts/ssh-relay-linux-node-gyp-compiler.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Linux node-gyp compiler test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-windows-pe-diagnostic.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Windows PE diagnostic script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-windows-pe-diagnostic.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'Windows PE diagnostic test syntax check failed' }
          node --check config/scripts/build-ssh-relay-runtime.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime build script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-build.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime build test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-closure.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime closure script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-closure.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime closure test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-sbom.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime SBOM script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-sbom.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime SBOM test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-provenance.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime provenance test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-toolchain.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime toolchain script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-toolchain.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime toolchain test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-plan.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing plan script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-plan.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing plan test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-selection.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing selection script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-selection.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing selection test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-payload.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing payload script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-payload.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing payload test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-windows-authenticode-assessment.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime Windows Authenticode assessment script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-windows-authenticode-assessment.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime Windows Authenticode assessment test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-stage.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing stage script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-stage.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing stage test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-apply.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing apply script syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-native-signing-apply.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing apply test syntax check failed' }
          node --check config/scripts/ssh-relay-runtime-macos-signature-verification.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime macOS signature verification script syntax check failed' }
